<html lang="pt-BR">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #222e35;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ── WhatsApp green top stripe ──────────────────────── */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 127px;
      background-color: #00a884;
      z-index: 0;
    }

    .app-container {
      width: 100%;
      max-width: 900px;
      height: 100vh;
      max-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #0b141a;
      position: relative;
      z-index: 1;
    }

    @media (min-width: 768px) {
      .app-container {
        height: 96vh;
        max-height: 96vh;
        border-radius: 3px;
        overflow: hidden;
        box-shadow: 0 1px 1px 0 rgba(0, 0, 0, 0.06),
                    0 2px 5px 0 rgba(0, 0, 0, 0.2);
      }
    }

    /* ── Header ─────────────────────────────────────────── */
    .chat-header {
      background-color: #202c33;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 59px;
      cursor: pointer;
      user-select: none;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00a884, #25d366);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .header-avatar::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent 60%);
    }

    .header-info {
      flex: 1;
    }

    .header-name {
      color: #e9edef;
      font-size: 16px;
      font-weight: 400;
    }

    .header-status {
      color: #8696a0;
      font-size: 13px;
      margin-top: 1px;
    }

    .header-status.online {
      color: #00a884;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .header-icon-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #aebac1;
      transition: background-color 0.15s;
    }

    .header-icon-btn:hover {
      background-color: rgba(134, 150, 160, 0.15);
    }

    .header-icon-btn svg {
      width: 24px;
      height: 24px;
    }

    /* ── Barra de configuracao (telefone) ────────────────── */
    .config-bar {
      background-color: #182229;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(134, 150, 160, 0.15);
      font-size: 13px;
    }

    .config-bar label {
      color: #8696a0;
      font-size: 13px;
      white-space: nowrap;
    }

    .config-bar input {
      flex: 1;
      max-width: 220px;
      background-color: #2a3942;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      color: #d1d7db;
      font-size: 13px;
      outline: none;
      transition: background-color 0.2s, border-color 0.2s;
      border: 1px solid transparent;
    }

    .config-bar input:focus {
      background-color: #2a3942;
      border-color: #00a884;
    }

    .config-bar input::placeholder {
      color: #667781;
    }

    .config-bar .phone-flag {
      color: #8696a0;
      font-size: 14px;
    }

    .status-indicator {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #8696a0;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #667781;
      transition: background-color 0.3s;
    }

    .status-dot.connected {
      background-color: #00a884;
      box-shadow: 0 0 6px rgba(0, 168, 132, 0.5);
    }

    .status-dot.disconnected {
      background-color: #ea4335;
    }

    /* ── Area de mensagens ───────────────────────────────── */
    .chat-background {
      flex: 1;
      overflow-y: auto;
      padding: 20px 48px;
      position: relative;
      scroll-behavior: smooth;

    @media (max-width: 600px) {
      .chat-background {
        padding: 12px 14px;
      }
    }

    .messages-container {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .message-wrapper {
      display: flex;
      margin-bottom: 2px;
    }

    .message-wrapper.user {
      justify-content: flex-end;
    }

    .message-wrapper.bot {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 65%;
      padding: 6px 7px 8px 9px;
      border-radius: 7.5px;
      position: relative;
      word-wrap: break-word;
      white-space: pre-wrap;
      line-height: 1.35;
      font-size: 14.2px;
      box-shadow: 0 1px 0.5px rgba(11, 20, 26, 0.13);
    }

    @media (max-width: 600px) {
      .message-bubble {
        max-width: 85%;
      }
    }

    /* ── User message (outgoing - right side) ──────────── */
    .message-wrapper.user .message-bubble {
      background-color: #005c4b;
      color: #e9edef;
      border-top-right-radius: 0;
    }

    .message-wrapper.user .message-bubble::before {
      content: '';
      position: absolute;
      top: 0;
      right: -8px;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 0 10px 8px;
      border-color: transparent transparent transparent #005c4b;
    }

    /* ── Bot message (incoming - left side) ─────────────── */
    .message-wrapper.bot .message-bubble {
      background-color: #202c33;
      color: #e9edef;
      border-top-left-radius: 0;
    }

    .message-wrapper.bot .message-bubble::before {
      content: '';
      position: absolute;
      top: 0;
      left: -8px;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 8px 10px 0;
      border-color: transparent #202c33 transparent transparent;
    }

    .message-text {
      margin-right: 52px;
      min-height: 18px;
    }

    .message-meta {
      float: right;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: -10px;
      margin-left: 8px;
      position: relative;
      top: 6px;
    }

    .message-time {
      color: rgba(233, 237, 239, 0.45);
      font-size: 11px;
      white-space: nowrap;
    }

    .message-check {
      color: #53bdeb;
      font-size: 14px;
      line-height: 1;
    }

    /* ── Typing indicator ───────────────────────────────── */
    .typing-indicator-wrapper {
      display: none;
      justify-content: flex-start;
      margin-bottom: 2px;
    }

    .typing-indicator-wrapper.visible {
      display: flex;
    }

    .typing-indicator {
      background-color: #202c33;
      border-radius: 7.5px;
      border-top-left-radius: 0;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 1px 0.5px rgba(11, 20, 26, 0.13);
      position: relative;
    }

    .typing-indicator::before {
      content: '';
      position: absolute;
      top: 0;
      left: -8px;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 8px 10px 0;
      border-color: transparent #202c33 transparent transparent;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background-color: #8696a0;
      animation: typing-bounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.4;
      }
      30% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    /* ── Welcome message ────────────────────────────────── */
    .welcome-message {
      background-color: rgba(255, 243, 191, 0.06);
      border-radius: 7.5px;
      padding: 10px 14px 10px 36px;
      margin: 8px auto 16px;
      max-width: 480px;
      text-align: center;
      position: relative;
      box-shadow: 0 1px 0.5px rgba(11, 20, 26, 0.13);
    }

    .welcome-message::before {
      content: '\1F512';
      position: absolute;
      left: 12px;
      top: 10px;
      font-size: 14px;
    }

    .welcome-message p {
      color: rgba(233, 237, 239, 0.6);
      font-size: 12px;
      line-height: 1.5;
    }

    .welcome-message .highlight {
      color: #00a884;
      font-weight: 500;
    }

    /* ── Date divider ───────────────────────────────────── */
    .date-divider {
      display: flex;
      justify-content: center;
      margin: 12px 0;
    }

    .date-divider span {
      background-color: #182229;
      color: rgba(233, 237, 239, 0.65);
      font-size: 12.5px;
      padding: 6px 12px;
      border-radius: 7.5px;
      box-shadow: 0 1px 0.5px rgba(11, 20, 26, 0.13);
      text-transform: uppercase;
      font-weight: 400;
      letter-spacing: 0.03em;
    }

    /* ── Input area ─────────────────────────────────────── */
    .input-area {
      background-color: #202c33;
      padding: 6px 10px;
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }

    .input-icon-btn {
      width: 40px;
      height: 42px;
      border: none;
      background: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #8696a0;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .input-icon-btn:hover {
      color: #aebac1;
    }

    .input-icon-btn svg {
      width: 24px;
      height: 24px;
    }

    .input-container {
      flex: 1;
      background-color: #2a3942;
      border-radius: 8px;
      display: flex;
      align-items: flex-end;
      min-height: 42px;
      max-height: 120px;
    }

    .message-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #d1d7db;
      font-size: 15px;
      padding: 10px 12px;
      resize: none;
      max-height: 120px;
      line-height: 1.35;
      font-family: inherit;
    }

    .message-input::placeholder {
      color: #667781;
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: none;
      color: #8696a0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      color: #e9edef;
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      color: #667781;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 24px;
      height: 24px;
    }

    /* ── Toast notifications ────────────────────────────── */
    .toast-container {
      position: absolute;
      top: 130px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background-color: #323f49;
      color: #e9edef;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      animation: toast-in 0.3s ease-out, toast-out 0.3s ease-in 3.7s forwards;
      white-space: nowrap;
    }

    .toast.error {
      background-color: #4a2023;
      border-left: 3px solid #ea4335;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toast-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* ── Scrollbar (WhatsApp style) ────────────────────── */
    .chat-background::-webkit-scrollbar {
      width: 6px;
    }

    .chat-background::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-background::-webkit-scrollbar-thumb {
      background-color: rgba(134, 150, 160, 0.3);
      border-radius: 3px;
    }

    .chat-background::-webkit-scrollbar-thumb:hover {
      background-color: rgba(134, 150, 160, 0.5);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div class="chat-header">
      <div class="header-avatar">A</div>
      <div class="header-info">
        <div class="header-name">Amaral Support</div>
        <div class="header-status" id="headerStatus">Simulador de Chat</div>
      </div>
      <div class="header-actions">
        <button class="header-icon-btn" title="Pesquisar">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.009 13.805h-.636l-.22-.219a5.184 5.184 0 001.256-3.386 5.207 5.207 0 10-5.207 5.208 5.183 5.183 0 003.385-1.255l.221.22v.635l4.004 3.999 1.194-1.195-3.997-4.007zm-4.808 0a3.598 3.598 0 01-3.6-3.6 3.598 3.598 0 013.6-3.6 3.598 3.598 0 013.6 3.6 3.598 3.598 0 01-3.6 3.6z"/></svg>
        </button>
        <button class="header-icon-btn" title="Menu">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 7a2 2 0 110-4 2 2 0 010 4zm0 7a2 2 0 110-4 2 2 0 010 4zm0 7a2 2 0 110-4 2 2 0 010 4z"/></svg>
        </button>
      </div>
    </div>

    <!-- Config bar (phone) -->
    <div class="config-bar">
      <span class="phone-flag">+55</span>
      <label for="phoneInput">Telefone:</label>
      <input
        type="tel"
        id="phoneInput"
        placeholder="11999998888"
        maxlength="15"
        value="11999998888"
      >
      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Desconectado</span>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-background" id="chatBackground">
      <div class="welcome-message">
        <p>
          Simulador de Chat <span class="highlight">WAHA</span><br>
          As mensagens enviadas aqui serao encaminhadas como webhook para o n8n,<br>
          simulando o fluxo real do WhatsApp.
        </p>
      </div>
      <div class="date-divider">
        <span id="todayDate">Hoje</span>
      </div>
      <div class="messages-container" id="messagesContainer"></div>
      <div class="typing-indicator-wrapper" id="typingIndicator">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Input area -->
    <div class="input-area">
      <button class="input-icon-btn" title="Emoji">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.153 11.603c.795 0 1.439-.879 1.439-1.962s-.644-1.962-1.439-1.962-1.439.879-1.439 1.962.644 1.962 1.439 1.962zm5.694 0c.795 0 1.439-.879 1.439-1.962s-.644-1.962-1.439-1.962-1.439.879-1.439 1.962.644 1.962 1.439 1.962zM12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8zm5.129-5.16c-.077-.136-.242-.183-.378-.106a8.26 8.26 0 01-4.329 1.218A8.577 8.577 0 018.1 14.74c-.136-.077-.3-.03-.378.106-.077.136-.03.301.106.378A9.157 9.157 0 0012.422 16.5a8.84 8.84 0 004.601-1.272c.136-.077.183-.242.106-.378z"/></svg>
      </button>
      <button class="input-icon-btn" title="Anexar">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1.816 15.556v.002c0 1.502.584 2.912 1.646 3.972s2.472 1.647 3.974 1.647a5.58 5.58 0 003.972-1.645l9.547-9.548c.769-.768 1.147-1.767 1.058-2.817-.079-.968-.548-1.927-1.319-2.698-1.594-1.592-4.068-1.711-5.517-.262l-7.916 7.915c-.881.881-.792 2.25.214 3.261.501.501 1.134.795 1.748.795.584 0 1.069-.228 1.46-.618l5.702-5.702c.18-.18.18-.472 0-.652a.463.463 0 00-.652 0l-5.702 5.702c-.237.237-.548.346-.866.346-.382 0-.775-.2-1.091-.516-.683-.684-.721-1.576-.079-2.218l7.916-7.915c.675-.675 1.62-.898 2.592-.613.853.251 1.647.944 2.18 1.477.996.996 1.387 2.349.905 3.543-.231.574-.649 1.108-1.167 1.626l-9.547 9.548a4.158 4.158 0 01-2.953 1.222c-1.116 0-2.165-.434-2.953-1.222a4.128 4.128 0 01-1.222-2.95 4.128 4.128 0 011.222-2.95L13.191 5.14c.18-.18.18-.472 0-.652a.463.463 0 00-.652 0L3.462 13.563a5.045 5.045 0 00-1.646 3.993z"/></svg>
      </button>
      <div class="input-container">
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="Mensagem"
          rows="1"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" title="Enviar mensagem">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.239 1.816-13.239 1.817-.011 7.912z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Socket.IO from CDN -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    (function () {
      'use strict';

      // ── Elementos DOM ─────────────────────────────────
      const messagesContainer = document.getElementById('messagesContainer');
      const chatBackground = document.getElementById('chatBackground');
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const phoneInput = document.getElementById('phoneInput');
      const typingIndicator = document.getElementById('typingIndicator');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const headerStatus = document.getElementById('headerStatus');
      const todayDate = document.getElementById('todayDate');
      const toastContainer = document.getElementById('toastContainer');

      // ── Data de hoje ──────────────────────────────────
      const today = new Date();
      const dayNames = ['Domingo', 'Segunda-feira', 'Terca-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sabado'];
      const monthNames = ['janeiro', 'fevereiro', 'marco', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
      todayDate.textContent = dayNames[today.getDay()] + ', ' + today.getDate() + ' de ' + monthNames[today.getMonth()];

      // ── Socket.IO ─────────────────────────────────────
      const socket = io({
        transports: ['websocket', 'polling'],
        reconnection: true,
        reconnectionAttempts: Infinity,
        reconnectionDelay: 1000,
        reconnectionDelayMax: 5000,
      });

      // ── Estado da conexao ─────────────────────────────
      socket.on('connect', function () {
        console.log('[Socket.IO] Conectado:', socket.id);
        statusDot.className = 'status-dot connected';
        statusText.textContent = 'Conectado';
        headerStatus.textContent = 'Online';
        headerStatus.className = 'header-status online';

        // Solicita historico de mensagens
        var phone = getPhone();
        if (phone) {
          socket.emit('get_history', { phone: phone });
        }
      });

      socket.on('disconnect', function () {
        console.log('[Socket.IO] Desconectado');
        statusDot.className = 'status-dot disconnected';
        statusText.textContent = 'Desconectado';
        headerStatus.textContent = 'Reconectando...';
        headerStatus.className = 'header-status';
      });

      socket.on('connect_error', function (err) {
        console.error('[Socket.IO] Erro de conexao:', err.message);
        statusDot.className = 'status-dot disconnected';
        statusText.textContent = 'Erro';
      });

      // ── Receber mensagem do bot ───────────────────────
      socket.on('bot_message', function (data) {
        console.log('[Bot]', data);
        var myPhone = getPhone();

        // So mostra mensagens destinadas ao nosso telefone
        if (data.phone && data.phone !== myPhone) {
          return;
        }

        hideTyping();
        appendMessage('bot', data.text, data.timestamp);
      });

      // ── Typing indicator ──────────────────────────────
      socket.on('typing', function (data) {
        var myPhone = getPhone();
        if (data.phone && data.phone !== myPhone) {
          return;
        }
        if (data.isTyping) {
          showTyping();
        } else {
          hideTyping();
        }
      });

      // ── Historico de mensagens ─────────────────────────
      socket.on('message_history', function (data) {
        if (!data.messages || data.messages.length === 0) return;
        messagesContainer.innerHTML = '';
        data.messages.forEach(function (msg) {
          appendMessage(msg.role === 'user' ? 'user' : 'bot', msg.text, msg.timestamp);
        });
      });

      // ── Erros ─────────────────────────────────────────
      socket.on('error_message', function (data) {
        console.error('[Erro]', data);
        hideTyping();
        showToast(data.error || 'Erro desconhecido', true);
      });

      // ── Funcoes auxiliares ────────────────────────────
      function getPhone() {
        return (phoneInput.value || '').replace(/\D/g, '');
      }

      function formatTime(timestamp) {
        var d = timestamp ? new Date(timestamp) : new Date();
        var h = d.getHours().toString().padStart(2, '0');
        var m = d.getMinutes().toString().padStart(2, '0');
        return h + ':' + m;
      }

      function appendMessage(role, text, timestamp) {
        var wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper ' + role;

        var bubble = document.createElement('div');
        bubble.className = 'message-bubble';

        var textEl = document.createElement('div');
        textEl.className = 'message-text';
        textEl.textContent = text;

        var meta = document.createElement('div');
        meta.className = 'message-meta';

        var time = document.createElement('span');
        time.className = 'message-time';
        time.textContent = formatTime(timestamp);

        meta.appendChild(time);

        if (role === 'user') {
          var check = document.createElement('span');
          check.className = 'message-check';
          check.innerHTML = '&#10003;&#10003;';
          meta.appendChild(check);
        }

        bubble.appendChild(textEl);
        bubble.appendChild(meta);
        wrapper.appendChild(bubble);
        messagesContainer.appendChild(wrapper);

        scrollToBottom();
      }

      function scrollToBottom() {
        requestAnimationFrame(function () {
          chatBackground.scrollTop = chatBackground.scrollHeight;
        });
      }

      function showTyping() {
        typingIndicator.classList.add('visible');
        headerStatus.textContent = 'Digitando...';
        headerStatus.className = 'header-status online';
        scrollToBottom();
      }

      function hideTyping() {
        typingIndicator.classList.remove('visible');
        if (socket.connected) {
          headerStatus.textContent = 'Online';
          headerStatus.className = 'header-status online';
        }
      }

      function showToast(message, isError) {
        var toast = document.createElement('div');
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.textContent = message;
        toastContainer.appendChild(toast);
        setTimeout(function () {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 4000);
      }

      // ── Enviar mensagem ───────────────────────────────
      function sendMessage() {
        var text = messageInput.value.trim();
        var phone = getPhone();

        if (!text) return;

        if (!phone || phone.length < 8) {
          showToast('Informe um numero de telefone valido', true);
          phoneInput.focus();
          return;
        }

        // Mostra a mensagem na tela imediatamente
        appendMessage('user', text, Date.now());

        // Envia via Socket.IO
        socket.emit('user_message', {
          phone: phone,
          text: text,
          name: 'Simulador (' + phone + ')',
        });

        // Limpa o input
        messageInput.value = '';
        messageInput.style.height = 'auto';
        messageInput.focus();
      }

      // ── Event listeners ───────────────────────────────
      sendBtn.addEventListener('click', sendMessage);

      messageInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Auto-resize textarea
      messageInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });

      // Quando mudar o telefone, solicita historico
      var phoneDebounceTimer;
      phoneInput.addEventListener('input', function () {
        clearTimeout(phoneDebounceTimer);
        phoneDebounceTimer = setTimeout(function () {
          var phone = getPhone();
          if (phone && phone.length >= 8) {
            messagesContainer.innerHTML = '';
            socket.emit('get_history', { phone: phone });
          }
        }, 500);
      });

      // Foco inicial no input de mensagem
      messageInput.focus();

      // ── Timeout para typing (seguranca) ───────────────
      var typingTimeout;
      socket.on('typing', function () {
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(function () {
          hideTyping();
        }, 30000); // 30s maximo de typing
      });

    })();
  </script>
</body>
</html>
